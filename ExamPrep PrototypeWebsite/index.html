<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamPrep - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-icon">📖</span>
        <span class="logo-text">ExamPrep</span>
      </div>
      <p class="login-tagline">Your student study resource hub</p>
      <div class="form-group">
        <label for="email">Student Email</label>
        <input type="email" id="email" placeholder="student@university.ac.za">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password">
      </div>
      <a href="home.html"><button class="btn-primary full-width">Login</button></a>
      <p class="register-link">New to ExamPrep? <a href="home.html">Create an account</a></p>
    </div>
  </div>
</body>
</html>
